name: Segurança - Supply Chain (sisrua_unified)

on:
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-gate:
    name: Gate de dependências vulneráveis (NPM)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sisrua_unified
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sisrua_unified/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Policy gate de vulnerabilidades (critical)
        run: npm audit --omit=dev --audit-level=critical

  sbom-check:
    name: SBOM check (CycloneDX)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sisrua_unified
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sisrua_unified/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Gerar SBOM
        run: npm run security:sbom:node

      - name: Validar estrutura mínima do SBOM
        run: |
          node -e "const fs=require('fs');const p='artifacts/sbom-node.json';if(!fs.existsSync(p)){throw new Error('SBOM não gerado');}const data=JSON.parse(fs.readFileSync(p,'utf8'));if(!Array.isArray(data.components)||data.components.length===0){throw new Error('SBOM sem componentes');}console.log('SBOM válido:',data.components.length,'componentes');"

      - name: Publicar artefato SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx-json
          path: sisrua_unified/artifacts/sbom-node.json
          retention-days: 30

  security-gate:
    name: Gate de segurança supply chain
    runs-on: ubuntu-latest
    needs: [dependency-gate, sbom-check]
    if: always()
    steps:
      - name: Consolidar resultado
        run: |
          echo "dependency-gate: ${{ needs.dependency-gate.result }}"
          echo "sbom-check: ${{ needs.sbom-check.result }}"

          if [ "${{ needs.dependency-gate.result }}" != "success" ] || [ "${{ needs.sbom-check.result }}" != "success" ]; then
            echo "Gate de segurança reprovado."
            exit 1
          fi

          echo "Gate de segurança aprovado."
