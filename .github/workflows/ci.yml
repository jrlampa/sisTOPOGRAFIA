name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
      - production
      - release/alpha-release
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sisTOPOGRAFIA

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sisTOPOGRAFIA/package-lock.json

      - name: Install Node dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Lint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Run backend tests
        run: npm run test:backend

      - name: TypeScript server build check
        run: npx tsc -p tsconfig.server.json

      - name: Frontend build check
        run: npm run build

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sisTOPOGRAFIA/py_engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: sisTOPOGRAFIA/py_engine/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Python tests
        run: python -m pytest tests/ -v --tb=short
