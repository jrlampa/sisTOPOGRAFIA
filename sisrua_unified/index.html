<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    />
    <title>Sis RUA - Extrator OSM para DXF 2.5D</title>
  </head>

  <body class="antialiased overflow-hidden">
    <div id="root">
      <!-- Splash Screen (UX-01) - Visible until React mounts -->
      <div
        id="loading-screen"
        style="
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: linear-gradient(135deg, #071524 0%, #0d2438 100%);
          color: white;
          font-family:
            system-ui,
            -apple-system,
            sans-serif;
          z-index: 9999;
        "
      >
        <div style="position: relative; width: 80px; height: 80px; margin-bottom: 24px">
          <div
            style="
              position: absolute;
              inset: 0;
              border: 4px solid rgba(56, 189, 248, 0.1);
              border-radius: 50%;
            "
          ></div>
          <div
            style="
              position: absolute;
              inset: 0;
              border: 4px solid transparent;
              border-top-color: #38bdf8;
              border-radius: 50%;
              animation: spin 1s linear infinite;
            "
          ></div>
        </div>
        <div
          style="
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #38bdf8;
            margin-bottom: 8px;
          "
        >
          SisRUA Unified
        </div>
        <div
          style="
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.1em;
          "
        >
          CARREGANDO ENGENHARIA 2.5D...
        </div>
        <style>
          @keyframes spin {
            to {
              transform: rotate(360deg);
            }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
