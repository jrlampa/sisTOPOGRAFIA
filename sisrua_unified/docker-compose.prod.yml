# SIS RUA Unified - Docker Compose HARDENED & OPTIMIZED
# Production-ready configuration with security best practices

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod # Use production build
    container_name: sisrua-app
    image: sisrua-unified:prod
    restart: on-failure:5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

    environment:
      - NODE_ENV=production
      - PORT=8080
      - PYTHON_COMMAND=python3
      - DOCKER_ENV=true
      # Read secrets from Docker Secret files (SECURE)
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
      - OLLAMA_HOST=http://ollama:11434
      - CORS_ORIGIN=http://localhost:3000
      - LOG_LEVEL=info

    secrets:
      - redis_password

    ports:
      - "127.0.0.1:8080:8080" # Localhost only

    volumes:
      - dxf-output:/app/public/dxf:rw
      - logs-data:/app/logs:rw
      # NO node_modules or cache on local - use volumes

    networks:
      - sisrua-network

    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
        reservations:
          cpus: "1.0"
          memory: 1.5G

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true

    read_only: false
    tmpfs:
      - /tmp
      - /run

  redis:
    image: redis:8.6-alpine
    container_name: sisrua-redis
    restart: on-failure:5

    command: >
      redis-server 
      --bind 0.0.0.0
      --protected-mode yes
      --requirepass $$(cat /run/secrets/redis_password)
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru

    secrets:
      - redis_password

    ports:
      - "127.0.0.1:6379:6379" # Localhost debug only

    volumes:
      - redis-data:/data:rw

    networks:
      - sisrua-network

    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "$$(cat /run/secrets/redis_password)",
          "ping",
        ]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 256M

    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID

    security_opt:
      - no-new-privileges:true

  ollama:
    image: ollama/ollama:0.22.0
    container_name: sisrua-ollama
    restart: on-failure:3

    environment:
      - OLLAMA_HOST=0.0.0.0:11434 # must listen on all interfaces so other containers can reach it
      - OLLAMA_KEEP_ALIVE=5m

    ports:
      - "127.0.0.1:11435:11434" # Debug only

    volumes:
      - ollama-data:/root/.ollama:rw

    networks:
      - sisrua-network

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5

    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "2.0"
          memory: 4G

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true

# Secrets loaded from external files (NOT in docker-compose)
secrets:
  redis_password:
    file: ./secrets/redis_password.txt

# Named volumes for data persistence
volumes:
  dxf-output:
    name: sisrua_dxf_output_prod
    driver: local
  logs-data:
    name: sisrua_logs_prod
    driver: local
  redis-data:
    name: sisrua_redis_data_prod
    driver: local
  ollama-data:
    name: sisrua_ollama_data_prod
    driver: local

# Custom bridge network (isolated)
networks:
  sisrua-network:
    name: sisrua-network
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-sisrua
      com.docker.network.bridge.enable_icc: "false"
