# SIS RUA Unified - Docker Compose for Development
# Optimizado para HMR (Hot Module Replacement) e sincronização de código em tempo real.
#
# Usage:
#   docker compose up --build  # Inicia em modo DEV
#   docker compose down        # Para os containers

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sisrua-app
    ports:
      - "8080:3000" # Frontend (Vite) acessível via localhost:8080
      - "3002:3001" # Backend API direta (mapeado para 3002 para evitar conflito com host)
    environment:
      - NODE_ENV=development
      - PORT=3001
      - PYTHON_COMMAND=python3
      - DOCKER_ENV=true
      - USE_FIRESTORE=false
      - USE_CLOUD_TASKS=false
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      # Monta o código fonte para HMR
      - .:/app
      # Protege o node_modules do container (evita conflito com o host se for Windows)
      - /app/node_modules
      # Persistência de dados
      - dxf-output:/app/public/dxf
      - cache-data:/app/cache
      - logs-data:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - sisrua-network

  redis:
    image: redis:7-alpine
    container_name: sisrua-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - sisrua-network
    profiles:
      - with-redis

  ollama:
    image: ollama/ollama:latest
    container_name: sisrua-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - sisrua-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    profiles:
      - with-ollama

volumes:
  dxf-output:
    name: sisrua_dxf_output
  cache-data:
    name: sisrua_cache
  logs-data:
    name: sisrua_logs
  redis-data:
    name: sisrua_redis_data
  ollama-data:
    name: sisrua_ollama_data

networks:
  sisrua-network:
    name: sisrua-network
    driver: bridge
