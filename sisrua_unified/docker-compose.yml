# SIS RUA Unified - Docker Compose for Development (SECURITY HARDENED)
# Optimizado para HMR e Segurança Máxima em ambiente local.
#
# SECURITY MEASURES:
# 1. Network: All host ports bound to 127.0.0.1 (Localhost only)
# 2. Secrets: Using Docker Secrets pattern (_FILE) for GROQ_API_KEY and REDIS_PASSWORD
# 3. Resources: CPU and Memory limits enforced for all services
# 4. Healthchecks: Automatic failure detection for app, redis, and ollama
# 5. Versions: Pinned image tags (no :latest)

services:
  app:
    image: sisrua-unified:dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sisrua-app
    ports:
      - "127.0.0.1:8080:3000" # Frontend (Vite) - LOCALHOST ONLY
      - "127.0.0.1:3002:3001" # Backend API - LOCALHOST ONLY
    environment:
      - NODE_ENV=development
      - PORT=3001
      - PYTHON_COMMAND=python3
      - DOCKER_ENV=true
      - APP_PUBLIC_URL=http://localhost:3002
      - CORS_ORIGIN=http://localhost:8080,http://localhost:3000,http://127.0.0.1:8080,http://127.0.0.1:3000
      - USE_FIRESTORE=false
      - USE_CLOUD_TASKS=false
      - GROQ_API_KEY_FILE=/run/secrets/groq_api_key
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
      - OLLAMA_HOST=http://ollama:11434
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    secrets:
      - groq_api_key
      - redis_password
    volumes:
      # Monta o código fonte para HMR (RW necessário em dev)
      - .:/app
      - /app/node_modules
      - dxf-output:/app/public/dxf
      - cache-data:/app/cache
      - logs-data:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - sisrua-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  redis:
    image: redis:7.4-alpine
    container_name: sisrua-redis
    command: >
      sh -c "redis-server --requirepass $$(cat /run/secrets/redis_password) --bind 0.0.0.0"
    secrets:
      - redis_password
    ports:
      - "127.0.0.1:6379:6379" # Debug only - LOCALHOST ONLY
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - sisrua-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  ollama:
    image: ollama/ollama:0.1.48
    container_name: sisrua-ollama
    ports:
      - "127.0.0.1:11435:11434" # Debug only - LOCALHOST ONLY
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - sisrua-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
      # Descomente abaixo se tiver GPU NVIDIA disponível no host
      # reservations:
      #   devices:
      #     - driver: nvidia
      #       count: 1
      #       capabilities: [gpu]

secrets:
  groq_api_key:
    file: ./secrets/groq_api_key.txt
  redis_password:
    file: ./secrets/redis_password.txt

volumes:
  dxf-output:
    name: sisrua_dxf_output
  cache-data:
    name: sisrua_cache
  logs-data:
    name: sisrua_logs
  redis-data:
    name: sisrua_redis_data
  ollama-data:
    name: sisrua_ollama_data

networks:
  sisrua-network:
    name: sisrua-network
    driver: bridge
