# SIS RUA Unified - Docker Compose for Development (HARDENED)
# Optimizado para HMR (Hot Module Replacement) e sincronização de código em tempo real.
# SECURITY HARDENED: Restricted network access, resource limits, internal networking
#
# Usage:
#   docker compose up --build  # Inicia em modo DEV
#   docker compose down        # Para os containers

services:
  app:
    image: sisrua-unified:dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sisrua-app
    ports:
      - "127.0.0.1:8080:3000" # Frontend (Vite) acessível APENAS via localhost:8080
      - "127.0.0.1:3002:3001" # Backend API APENAS acessível localmente (3002)
    environment:
      - NODE_ENV=development
      - PORT=3001
      - PYTHON_COMMAND=python3
      - DOCKER_ENV=true
      - APP_PUBLIC_URL=http://localhost:3002
      - CORS_ORIGIN=http://localhost:8080,http://localhost:3000,http://127.0.0.1:8080,http://127.0.0.1:3000
      - USE_FIRESTORE=false
      - USE_CLOUD_TASKS=false
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OLLAMA_HOST=http://ollama:11434
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      # Monta o código fonte para HMR
      - .:/app
      # Protege o node_modules do container (evita conflito com o host se for Windows)
      - /app/node_modules
      # Persistência de dados
      - dxf-output:/app/public/dxf
      - cache-data:/app/cache
      - logs-data:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - sisrua-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: sisrua-redis
    # SECURITY: Redis NOT exposed to external network - internal only
    # To access from host: use 'docker exec sisrua-redis redis-cli' or port-forward
    ports:
      - "127.0.0.1:6379:6379" # Local-only access (for debugging only)
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --bind 0.0.0.0
    # SECURITY: Added password requirement. Change REDIS_PASSWORD in .env file!
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - sisrua-network
    profiles:
      - with-redis
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  ollama:
    image: ollama/ollama:latest
    container_name: sisrua-ollama
    # SECURITY: Ollama NOT exposed to external network - internal only
    # To access from host: use port-forward or 'docker exec sisrua-ollama ollama'
    ports:
      - "127.0.0.1:11435:11434" # Local-only access (for debugging only)
    # SECURITY: Set OLLAMA_HOST to internal network binding only
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - sisrua-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    profiles:
      - with-ollama
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

volumes:
  dxf-output:
    name: sisrua_dxf_output
  cache-data:
    name: sisrua_cache
  logs-data:
    name: sisrua_logs
  redis-data:
    name: sisrua_redis_data
  ollama-data:
    name: sisrua_ollama_data

networks:
  sisrua-network:
    name: sisrua-network
    driver: bridge
