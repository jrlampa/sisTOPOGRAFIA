services:
  app:
    image: sisrua-unified:dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sisrua-app
    ports:
      - '127.0.0.1:8080:3000'
      - '127.0.0.1:3002:3001'
    environment:
      - NODE_ENV=development
      - PORT=3001
      - PYTHON_COMMAND=python3
      - DOCKER_ENV=true
      - OLLAMA_HOST=http://ollama:11434
      - APP_PUBLIC_URL=http://localhost:3002
      - CORS_ORIGIN=http://localhost:8080,http://localhost:3000,http://127.0.0.1:8080,http://127.0.0.1:3000
      - USE_FIRESTORE=false
      - USE_CLOUD_TASKS=false
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DEPLOYMENT_MODE=cloud
      - HELMET_ENABLED=true
      - CSRF_PROTECTION=true
      - HTTP_TIMEOUT_MS=10000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    secrets:
      - redis_password
    volumes:
      - .:/app
      - /app/node_modules
      - dxf-output:/app/public/dxf
      - cache-data:/app/cache
      - logs-data:/app/logs
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - sisrua-network
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

  redis:
    image: redis:8.6-alpine
    container_name: sisrua-redis
    command:
      [
        'sh',
        '-c',
        'redis-server --requirepass $$(cat /run/secrets/redis_password) --bind 0.0.0.0 --port 6379',
      ]
    secrets:
      - redis_password
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - sisrua-network
    healthcheck:
      test:
        ['CMD-SHELL', 'redis-cli --no-auth-warning -a "$$(cat /run/secrets/redis_password)" ping']
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

  ollama:
    image: ollama/ollama:0.22.0
    container_name: sisrua-ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=5m
    ports:
      - '127.0.0.1:11435:11434'
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - sisrua-network
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5

secrets:
  redis_password:
    file: ./secrets/redis_password.txt

volumes:
  dxf-output:
    name: sisrua_dxf_output
  cache-data:
    name: sisrua_cache
  logs-data:
    name: sisrua_logs
  redis-data:
    name: sisrua_redis_data
  ollama-data:
    name: sisrua_ollama_data

networks:
  sisrua-network:
    name: sisrua-network
    driver: bridge
