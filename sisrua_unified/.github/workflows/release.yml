            --to-tags="${{ steps.deploy-blue.outputs.tag }}=100"
          echo "Trafego migrado com sucesso para tag '${{ steps.deploy-blue.outputs.tag }}' em ${{ env.SVC }}"

      - name: "Blue/Green: rollback automático em caso de falha"
        if: failure()
        run: |
          PREV="${{ steps.revisao-atual.outputs.revision }}"
          if [ -n "$PREV" ]; then
            echo "Iniciando rollback para revisao anterior: ${PREV}"
            gcloud run services update-traffic "${{ env.SVC }}" \
              --region "${{ env.GCP_REGION }}" \
              --to-revisions="${PREV}=100"
            echo "Rollback concluido em ${{ env.SVC }} – revisao ${PREV} atende 100% do trafego"
          else
            echo "Sem revisao anterior para rollback (primeiro deploy do servico)"
          fi

  # ====================================================================
  # ESTÁGIO 4 – DEPLOY PRODUCTION (Blue/Green)
  # Gate de promoção: regras de proteção do GitHub Environment "production"
  # Serviço Cloud Run: sisrua-app (sem sufixo – serviço de produção)
  # ====================================================================
  deploy-production:
    name: "Deploy Blue/Green → production"
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-pre-prod]
    timeout-minutes: 15
    environment: production
    # Em push: executa após pre-prod (success ou skipped)
    # Em dispatch: executa apenas quando o alvo manual for "production"
    if: >-
      always() &&
      needs.build-and-push.result == 'success' &&
      (needs.deploy-pre-prod.result == 'success' || needs.deploy-pre-prod.result == 'skipped') &&
      (github.event_name == 'push' || github.event.inputs.target_environment == 'production')
    env:
      SVC: sisrua-app
      NODE_ENV_VALUE: production

    steps:
      - name: Configurar Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}

      - name: Capturar revisão ativa atual (candidata ao rollback)
