              if t.get('tag') == tag:
                  print(t.get('url', ''))
                  break
          " "$TAG" 2>/dev/null || true)

          if [ -z "$TAGGED_URL" ]; then
            echo "URL com tag nao encontrada; usando URL principal do servico"
            TAGGED_URL=$(gcloud run services describe "${{ env.SVC }}" \
              --region "${{ env.GCP_REGION }}" \
              --format 'value(status.url)')
          fi

          echo "Verificando saude em: ${TAGGED_URL}/health"
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 15 "${TAGGED_URL}/health"; then
              echo "Health check aprovado na tentativa ${i}!"
              exit 0
            fi
            echo "Tentativa ${i}/5 falhou – aguardando 15s..."
            sleep 15
          done
          echo "ERRO: health check falhou apos 5 tentativas"
          exit 1

      - name: "Blue/Green: migrar 100% do tráfego para nova revisão (verde)"
        if: success()
        run: |
          gcloud run services update-traffic "${{ env.SVC }}" \
            --region "${{ env.GCP_REGION }}" \
            --to-tags="${{ steps.deploy-blue.outputs.tag }}=100"
          echo "Trafego migrado com sucesso para tag '${{ steps.deploy-blue.outputs.tag }}' em ${{ env.SVC }}"

      - name: "Blue/Green: rollback automático em caso de falha"
        if: failure()
        run: |
          PREV="${{ steps.revisao-atual.outputs.revision }}"
          if [ -n "$PREV" ]; then
            echo "Iniciando rollback para revisao anterior: ${PREV}"
            gcloud run services update-traffic "${{ env.SVC }}" \
              --region "${{ env.GCP_REGION }}" \
              --to-revisions="${PREV}=100"
            echo "Rollback concluido em ${{ env.SVC }} – revisao ${PREV} atende 100% do trafego"
          else
            echo "Sem revisao anterior para rollback (primeiro deploy do servico)"
          fi

  # ====================================================================
  # ESTÁGIO 3 – DEPLOY PRE-PROD (Blue/Green)
  # Gate de promoção: regras de proteção do GitHub Environment "pre-prod"
  # Serviço Cloud Run: sisrua-app-pre-prod
  # ====================================================================
  deploy-pre-prod:
    name: "Deploy Blue/Green → pre-prod"
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-homolog]
    timeout-minutes: 15
    environment: pre-prod
    # Em push: executa após homolog (success ou skipped)
    # Em dispatch: executa apenas quando o alvo manual for "pre-prod"
    if: >-
      always() &&
      needs.build-and-push.result == 'success' &&
      (needs.deploy-homolog.result == 'success' || needs.deploy-homolog.result == 'skipped') &&
      (github.event_name == 'push' || github.event.inputs.target_environment == 'pre-prod')
    env:
      SVC: sisrua-app-pre-prod
      NODE_ENV_VALUE: staging

    steps:
      - name: Configurar Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}

      - name: Capturar revisão ativa atual (candidata ao rollback)
        id: revisao-atual
        run: |
          REV=$(gcloud run services describe "${{ env.SVC }}" \
