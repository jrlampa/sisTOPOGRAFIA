          echo "revision=${REV}" >> "$GITHUB_OUTPUT"
          echo "Revisao ativa em ${{ env.SVC }}: ${REV:-'(nenhuma – primeiro deploy)'}"

      - name: "Blue/Green: implantar nova revisão SEM tráfego (instância azul)"
        id: deploy-blue
        run: |
          TAG="blue-${GITHUB_SHA:0:8}"
          gcloud run deploy "${{ env.SVC }}" \
            --image "gcr.io/${{ secrets.GCP_PROJECT }}/${{ env.SERVICE_NAME }}:${{ github.sha }}" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --no-traffic \
            --tag "$TAG" \
            --set-env-vars "NODE_ENV=${{ env.NODE_ENV_VALUE }}" \
            --set-env-vars "CLOUD_RUN_BASE_URL=${{ secrets.CLOUD_RUN_SERVICE_URL }}" \
            --set-env-vars "CLOUD_RUN_SERVICE_URL=${{ secrets.CLOUD_RUN_SERVICE_URL }}" \
            --set-env-vars "GCP_PROJECT=${{ secrets.GCP_PROJECT }}" \
            --set-secrets "GROQ_API_KEY=groq-api-key:latest"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: "Blue/Green: health check na nova revisão (sem tráfego real)"
        id: health-check
        run: |
          TAG="${{ steps.deploy-blue.outputs.tag }}"
          TAGGED_URL=$(gcloud run services describe "${{ env.SVC }}" \
