                  print(t.get('url', ''))
                  break
          " "$TAG" 2>/dev/null || true)

          if [ -z "$TAGGED_URL" ]; then
            echo "URL com tag nao encontrada; usando URL principal do servico"
            TAGGED_URL=$(gcloud run services describe "${{ env.SVC }}" \
              --region "${{ env.GCP_REGION }}" \
              --format 'value(status.url)')
          fi

          echo "Verificando saude em: ${TAGGED_URL}/health"
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 15 "${TAGGED_URL}/health"; then
              echo "Health check aprovado na tentativa ${i}!"
              exit 0
            fi
            echo "Tentativa ${i}/5 falhou – aguardando 15s..."
            sleep 15
          done
          echo "ERRO: health check falhou apos 5 tentativas"
          exit 1

      - name: "Blue/Green: migrar 100% do tráfego para nova revisão (verde)"
        if: success()
        run: |
          gcloud run services update-traffic "${{ env.SVC }}" \
            --region "${{ env.GCP_REGION }}" \
            --to-tags="${{ steps.deploy-blue.outputs.tag }}=100"
          echo "Trafego migrado com sucesso para tag '${{ steps.deploy-blue.outputs.tag }}' em producao"

      - name: "Blue/Green: rollback automático em caso de falha"
        if: failure()
        run: |
          PREV="${{ steps.revisao-atual.outputs.revision }}"
          if [ -n "$PREV" ]; then
            echo "Iniciando rollback para revisao anterior: ${PREV}"
            gcloud run services update-traffic "${{ env.SVC }}" \
              --region "${{ env.GCP_REGION }}" \
              --to-revisions="${PREV}=100"
            echo "Rollback concluido em producao – revisao ${PREV} atende 100% do trafego"
          else
            echo "Sem revisao anterior para rollback (primeiro deploy do servico)"
          fi

  # ====================================================================
  # SMOKE TESTS PÓS-DEPLOY (produção)
  # ====================================================================
  smoke-tests:
    name: Smoke Tests Pós-Deploy (production)
    runs-on: ubuntu-latest
    needs: [deploy-production]
    timeout-minutes: 10

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Configurar Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}

      - name: Obter URL do serviço de produção
        run: |
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region "${{ env.GCP_REGION }}" \
            --format 'value(status.url)')
          echo "SERVICE_URL=${URL}" >> "$GITHUB_ENV"

      - name: Aguardar serviço ficar pronto
        run: |
          echo "Aguardando o servico de producao ficar disponivel..."
          sleep 30
          curl -sf "${{ env.SERVICE_URL }}/health" || (echo "Servico nao disponivel" && exit 1)

      - name: Executar smoke tests
        run: npm run test:e2e -- --grep "@smoke"
        env:
          BASE_URL: ${{ env.SERVICE_URL }}
          NODE_ENV: production

      - name: Upload dos resultados dos smoke tests
        uses: actions/upload-artifact@v4
        if: ${{ always() && !env.ACT }}
        with:
          name: smoke-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Notificar sucesso do deploy
        if: success()
        run: |
          echo "Deploy em producao concluido com sucesso!"
          echo "URL do servico: ${{ env.SERVICE_URL }}"
          echo "Commit: ${{ github.sha }}"
          echo "Estágios concluídos: dev -> homolog -> pre-prod -> production"
