name: Quality Gates - PR

on:
  pull_request:
    branches: [main, master, dev]
  push:
    branches: [main, master]

permissions:
  contents: read
  attestations: write
  id-token: write

defaults:
  run:
    working-directory: sisrua_unified

jobs:
  # ============================================
  # BACKEND TESTS
  # ============================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test:backend
        env:
          NODE_ENV: test
          OFFLINE_MODE: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: ${{ always() && !env.ACT }}
        with:
          name: backend-coverage
          path: coverage/backend/
          retention-days: 7

  # ============================================
  # FRONTEND TESTS
  # ============================================
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:frontend
        env:
          NODE_ENV: test

      - name: Run frontend risk-focused tests
        run: npm run test:frontend:risk
        env:
          NODE_ENV: test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: ${{ always() && !env.ACT }}
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 7

  # ============================================
  # LINT & TYPE CHECK
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  # ============================================
  # SECURITY AUDIT
  # ============================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate SBOM (CycloneDX)
        run: npm run security:sbom:node

      - name: Enforce dependency vulnerability policy gate (security:audit)
        run: npm run security:policy-gate

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: ${{ always() && !env.ACT }}
        with:
          name: sbom-node
          path: artifacts/sbom-node.json
          retention-days: 7

  # ============================================
  # BUILD VERIFICATION
  # ============================================
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test-backend, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Generate build provenance attestation (SLSA)
        if: ${{ !env.ACT }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            sisrua_unified/dist/**

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: ${{ !env.ACT }}
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # ============================================
  # CQT PARITY P0 GATE
  # ============================================
  parity-p0:
    name: CQT Parity P0 Gate
    runs-on: ubuntu-latest
    if: ${{ !github.event.act }}
    timeout-minutes: 5
    needs: [test-backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CQT parity P0 check
        run: |
          if [[ -d /var/run/act ]]; then
            echo "Skipping strict workbook audit in local act emulation"
            npm run cqt:parity-check:strict || true
          else
            npm run cqt:parity-check:strict
          fi
        env:
          NODE_ENV: test
          OFFLINE_MODE: true

  # ============================================
  # E2E SMOKE TESTS
  # ============================================
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    if: ${{ !github.event.act }}
    timeout-minutes: 15
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: |
          if [[ -d /var/run/act ]]; then
            echo "Skipping Playwright browser install in local act emulation"
          else
            npx playwright install --with-deps chromium
          fi

      - name: Run E2E release smoke tests (contract/auth/snapshot)
        run: |
          if [[ -d /var/run/act ]]; then
            echo "Skipping E2E smoke tests in local act emulation"
          else
            npm run test:e2e:release:smoke
          fi
        env:
          NODE_ENV: test
          OFFLINE_MODE: true

      - name: Analyze E2E flakiness (reliability gate)
        if: ${{ !env.ACT }}
        run: npm run ci:e2e:flake-check

      - name: Enforce snapshot latency/availability SLO
        if: ${{ !env.ACT }}
        run: npm run ci:e2e:snapshot-slo

      - name: Upload E2E artifacts
        uses: actions/upload-artifact@v4
        if: ${{ always() && !env.ACT }}
        with:
          name: e2e-report
          path: |
            playwright-report/
            test-results/
            artifacts/ci/flakiness-report.json
            artifacts/ci/flakiness-report.md
            artifacts/ci/snapshot-slo-report.json
            artifacts/ci/snapshot-slo-report.md
          retention-days: 7

  # ============================================
  # CHECKPOINTS-TIMELINE MUST HAVE + D+5 GATE
  # ============================================
  checkpoint-timeline:
    name: Checkpoints Timeline Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Enforce CHECKPOINTS-TIMELINE policy
        run: npm run ci:checkpoint-gate

  normative-checklist:
    name: Normative Checklist Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Enforce normative checklist with evidence
        run: npm run ci:normative-checklist-gate

      - name: Upload normative checklist evidence
        uses: actions/upload-artifact@v4
        if: ${{ always() && !env.ACT }}
        with:
          name: normative-checklist-report
          path: |
            artifacts/ci/normative-checklist-report.json
            artifacts/ci/normative-checklist-report.md
          retention-days: 7

  # ============================================
  # QUALITY GATE SUMMARY
  # ============================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs:
      [
        lint,
        security,
        test-backend,
        test-frontend,
        parity-p0,
        build,
        e2e-smoke,
        checkpoint-timeline,
        normative-checklist,
      ]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          echo "Backend Tests: ${{ needs.test-backend.result }}"
          echo "Frontend Tests: ${{ needs.test-frontend.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "CQT Parity P0: ${{ needs.parity-p0.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "E2E Smoke: ${{ needs.e2e-smoke.result }}"
          echo "Checkpoint Timeline: ${{ needs.checkpoint-timeline.result }}"
          echo "Normative Checklist: ${{ needs.normative-checklist.result }}"

          is_ok_result() {
            local job_name="$1"
            local result="$2"

            if [[ "$result" == "success" ]]; then
              return 0
            fi

            # Parity and E2E may be intentionally skipped in local emulation.
            if [[ "$result" == "skipped" ]] && \
              { [[ "$job_name" == "parity-p0" ]] || [[ "$job_name" == "e2e-smoke" ]]; }; then
              return 0
            fi

            return 1
          }

          if ! is_ok_result "test-backend" "${{ needs.test-backend.result }}" || \
             ! is_ok_result "test-frontend" "${{ needs.test-frontend.result }}" || \
             ! is_ok_result "lint" "${{ needs.lint.result }}" || \
             ! is_ok_result "security" "${{ needs.security.result }}" || \
             ! is_ok_result "parity-p0" "${{ needs.parity-p0.result }}" || \
             ! is_ok_result "build" "${{ needs.build.result }}" || \
             ! is_ok_result "checkpoint-timeline" "${{ needs.checkpoint-timeline.result }}" || \
             ! is_ok_result "normative-checklist" "${{ needs.normative-checklist.result }}" || \
             ! is_ok_result "e2e-smoke" "${{ needs.e2e-smoke.result }}"; then
            echo "❌ Quality gate FAILED"
            exit 1
          fi

          echo "✅ Quality gate PASSED"
